services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fleetops
      POSTGRES_PASSWORD: fleetops
      POSTGRES_DB: fleetops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleetops"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://fleetops:fleetops@db:5432/fleetops
      APP_ENV: development
      SECRET_KEY: changeme
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
